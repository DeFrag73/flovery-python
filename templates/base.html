<!DOCTYPE html>
<html lang="uk" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Bloom & Soil{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Відібрана колекція квітів, ґрунту, добрив та аксесуарів.{% endblock %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:      '#F7F3EE',
            parchment:  '#EDE6DA',
            sage:       '#7A9A7E',
            'sage-dark':'#5A7A5E',
            terracotta: '#C4704A',
            'terra-light': '#D4906A',
            bark:       '#3D2B1F',
            mist:       '#B8C8B9',
          },
          fontFamily: {
            display: ['Raleway', 'serif'],
            body:    ['Lato', 'sans-serif'],
          },
          backgroundImage: {
            'grain': "url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E\")",
          },
        }
      }
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="/static/css/app.css">

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-cream font-body text-bark min-h-screen flex flex-col">

  <header class="sticky top-0 z-40 bg-cream/90 backdrop-blur-sm border-b border-parchment">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">

      <a href="/" class="flex items-center gap-2 group">
        <span class="text-2xl select-none">🌿</span>
        <span class="font-display font-semibold text-lg text-bark tracking-wide group-hover:text-sage transition-colors">
          Bloom &amp; Soil
        </span>
      </a>

      <nav class="flex items-center gap-4 text-sm font-body font-light">
        <a href="/" class="text-bark/70 hover:text-sage transition-colors hidden sm:block">Каталог</a>
        <a href="/admin-panel"
          class="hidden bg-bark text-cream px-3 py-1.5 rounded-full text-xs font-semibold tracking-wider hover:bg-terracotta transition-colors">
          Адмін
        </a>
      </nav>

    </div>
  </header>

  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-6 md:py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-parchment bg-parchment/60 py-6 text-center text-xs text-bark/50 font-light">
    <p>© 2026 Bloom &amp; Soil — вирощено з турботою</p>
  </footer>

  <div x-data="{ open: false }" class="fixed bottom-6 right-5 z-50 flex flex-col items-end gap-2">

    <div x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0 translate-y-2"
         class="flex flex-col items-end gap-2">

      <a href="https://wa.me/380966588516" target="_blank" rel="noopener"
         class="flex items-center gap-2 bg-white shadow-lg rounded-full pr-4 pl-3 py-2 text-sm font-semibold text-bark hover:bg-sage hover:text-white transition-all group">
        <span class="w-8 h-8 rounded-full bg-[#25D366] flex items-center justify-center text-white text-base shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.89.525 3.655 1.432 5.167L2 22l4.967-1.403A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18.182a8.182 8.182 0 01-4.18-1.144l-.299-.178-3.104.876.877-3.041-.196-.312A8.182 8.182 0 1112 20.182z"/>
          </svg>
        </span>
        WhatsApp
      </a>

      <a href="https://t.me/LudmylaSa" target="_blank" rel="noopener"
         class="flex items-center gap-2 bg-white shadow-lg rounded-full pr-4 pl-3 py-2 text-sm font-semibold text-bark hover:bg-[#229ED9] hover:text-white transition-all group">
        <span class="w-8 h-8 rounded-full bg-[#229ED9] flex items-center justify-center text-white text-base shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
        </span>
        Telegram
      </a>

      <a href="tel:+380966588516"
         class="flex items-center gap-2 bg-white shadow-lg rounded-full pr-4 pl-3 py-2 text-sm font-semibold text-bark hover:bg-terracotta hover:text-white transition-all group">
        <span class="w-8 h-8 rounded-full bg-terracotta flex items-center justify-center text-white shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd" d="M1.5 4.5a3 3 0 013-3h1.372c.86 0 1.61.586 1.819 1.42l1.105 4.423a1.875 1.875 0 01-.694 1.955l-1.293.97c-.135.101-.164.249-.126.352a11.285 11.285 0 006.697 6.697c.103.038.25.009.352-.126l.97-1.293a1.875 1.875 0 011.955-.694l4.423 1.105c.834.209 1.42.959 1.42 1.82V19.5a3 3 0 01-3 3h-2.25C8.552 22.5 1.5 15.448 1.5 6.75V4.5z" clip-rule="evenodd"/>
          </svg>
        </span>
        Зателефонувати
      </a>
    </div>

    <button @click="open = !open"
            :class="open ? 'bg-bark rotate-90' : 'bg-terracotta'"
            class="w-14 h-14 rounded-full shadow-xl text-white flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95">

      <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
        <path fill-rule="evenodd" d="M1.5 4.5a3 3 0 013-3h1.372c.86 0 1.61.586 1.819 1.42l1.105 4.423a1.875 1.875 0 01-.694 1.955l-1.293.97c-.135.101-.164.249-.126.352a11.285 11.285 0 006.697 6.697c.103.038.25.009.352-.126l.97-1.293a1.875 1.875 0 011.955-.694l4.423 1.105c.834.209 1.42.959 1.42 1.82V19.5a3 3 0 01-3 3h-2.25C8.552 22.5 1.5 15.448 1.5 6.75V4.5z" clip-rule="evenodd"/>
      </svg>

      <svg x-show="open" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>

    </button>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
