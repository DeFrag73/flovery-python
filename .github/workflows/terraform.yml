name: 'Terraform Infrastructure'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/**' # Запускаємо тільки при зміні інфраструктури
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform # Вказуємо папку з tf файлами

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Plan
      run: terraform plan -input=false
      env:
        # Передаємо секрети як змінні середовища
        TF_VAR_project_id: "твій-gcp-project-id" # Можна захардкодити або винести в secrets
        TF_VAR_mongo_url: ${{ secrets.MONGO_URL }}
        TF_VAR_admin_api_token: ${{ secrets.ADMIN_API_TOKEN }}
        TF_VAR_cloudinary_cloud_name: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        TF_VAR_cloudinary_api_key: ${{ secrets.CLOUDINARY_API_KEY }}
        TF_VAR_cloudinary_api_secret: ${{ secrets.CLOUDINARY_API_SECRET }}

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false
      env:
        TF_VAR_project_id: "твій-gcp-project-id"
        TF_VAR_mongo_url: ${{ secrets.MONGO_URL }}
        TF_VAR_admin_api_token: ${{ secrets.ADMIN_API_TOKEN }}
        TF_VAR_cloudinary_cloud_name: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        TF_VAR_cloudinary_api_key: ${{ secrets.CLOUDINARY_API_KEY }}
        TF_VAR_cloudinary_api_secret: ${{ secrets.CLOUDINARY_API_SECRET }}