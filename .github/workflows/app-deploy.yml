name: 'Deploy App to Cloud Run'

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'terraform/**' # Ігноруємо зміни в інфраструктурі
      - 'README.md'

env:
  PROJECT_ID: "твій-gcp-project-id"
  REGION: "europe-west1"
  REPO_NAME: "bloom-repo"
  SERVICE_NAME: "bloom-catalog-api"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker build -t $IMAGE_TAG .
        docker push $IMAGE_TAG

    - name: Deploy to Cloud Run
      run: |
        IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image $IMAGE_TAG \
          --region ${{ env.REGION }} \
          --quiet