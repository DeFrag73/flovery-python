services:

  # ── FastAPI Application ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: flowery
    container_name: flower_catalog_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - catalog_net

networks:
  catalog_net:
    driver: bridge